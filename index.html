<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Legal Multi-Agent Console</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d8dde6;
      --primary: #1b5e7a;
      --primary-dark: #14465b;
      --accent: #b86b2f;
      --ok: #1f7a4d;
      --bad: #a43737;
      --shadow: 0 12px 30px rgba(20, 35, 50, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--line);
      background: #eef2f5;
      padding: 28px 22px;
    }

    main {
      padding: 28px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      margin-top: 26px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .pill.ok .dot {
      background: var(--ok);
    }

    .pill.bad .dot {
      background: var(--bad);
    }

    .examples {
      margin-top: 26px;
    }

    .examples h2,
    .meta h2 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      color: #314252;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .example-list {
      display: grid;
      gap: 8px;
    }

    .example {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      text-align: left;
      font: inherit;
      font-size: 13px;
      line-height: 1.35;
      cursor: pointer;
    }

    .example:hover {
      border-color: var(--primary);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(260px, 1fr);
      gap: 18px;
    }

    .composer,
    .answer {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .composer {
      padding: 18px;
    }

    label {
      display: block;
      margin: 0 0 8px;
      font-weight: 700;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 132px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: #fbfcfd;
      outline: none;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(27, 94, 122, 0.12);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    button.primary {
      min-height: 40px;
      padding: 0 15px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary:hover {
      background: var(--primary-dark);
    }

    button.primary:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .answer {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .answer-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .answer-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .latency {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    pre {
      margin: 0;
      padding: 18px;
      white-space: pre-wrap;
      overflow: auto;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .shell {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <h1>Legal Multi-Agent Console</h1>
      <p class="subtitle">Giao diện web cho Customer Agent, Law Agent, Tax Agent và Compliance Agent.</p>

      <section class="status">
        <div class="status-row">
          <span>Customer Agent</span>
          <span id="statusPill" class="pill"><span class="dot"></span><span id="statusText">Checking</span></span>
        </div>
      </section>

      <section class="examples">
        <h2>Câu hỏi mẫu</h2>
        <div class="example-list">
          <button class="example" type="button">If a company breaks a contract and avoids taxes, what are the legal and regulatory consequences?</button>
          <button class="example" type="button">Nếu công ty bị rò rỉ dữ liệu khách hàng thì hậu quả pháp lý là gì?</button>
          <button class="example" type="button">What happens if a startup shares user data without consent?</button>
        </div>
      </section>
    </aside>

    <main>
      <section class="workspace">
        <form id="askForm" class="composer">
          <label for="question">Câu hỏi pháp lý</label>
          <textarea id="question" name="question" autocomplete="off" spellcheck="true">If a company breaks a contract and avoids taxes, what are the legal and regulatory consequences?</textarea>
          <div class="actions">
            <button id="askButton" class="primary" type="submit">Ask agents</button>
            <span id="runState" class="hint">Ready</span>
          </div>
        </form>

        <section class="answer">
          <div class="answer-head">
            <h2>Kết quả</h2>
            <span id="latency" class="latency"></span>
          </div>
          <pre id="answer" class="empty">Chưa có kết quả.</pre>
        </section>
      </section>
    </main>
  </div>

  <script>
    const form = document.querySelector("#askForm");
    const question = document.querySelector("#question");
    const answer = document.querySelector("#answer");
    const askButton = document.querySelector("#askButton");
    const runState = document.querySelector("#runState");
    const latency = document.querySelector("#latency");
    const statusPill = document.querySelector("#statusPill");
    const statusText = document.querySelector("#statusText");

    function setStatus(ok, text) {
      statusPill.classList.toggle("ok", ok);
      statusPill.classList.toggle("bad", !ok);
      statusText.textContent = text;
    }

    async function refreshStatus() {
      try {
        const response = await fetch("/api/status");
        const data = await response.json();
        setStatus(Boolean(data.ok), data.ok ? "Online" : "Offline");
      } catch {
        setStatus(false, "Offline");
      }
    }

    async function askAgents(text) {
      const response = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: text })
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || "Request failed");
      }
      return data;
    }

    document.querySelectorAll(".example").forEach((button) => {
      button.addEventListener("click", () => {
        question.value = button.textContent.trim();
        question.focus();
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = question.value.trim();
      if (!text) {
        question.focus();
        return;
      }

      askButton.disabled = true;
      runState.textContent = "Agents are working...";
      latency.textContent = "";
      answer.classList.remove("empty");
      answer.textContent = "Đang xử lý...";

      try {
        const data = await askAgents(text);
        answer.textContent = data.answer;
        latency.textContent = `${data.latency_seconds.toFixed(2)}s`;
        runState.textContent = "Done";
      } catch (error) {
        answer.textContent = error.message;
        latency.textContent = "";
        runState.textContent = "Failed";
      } finally {
        askButton.disabled = false;
        refreshStatus();
      }
    });

    refreshStatus();
    setInterval(refreshStatus, 10000);
  </script>
</body>
</html>
